kind = "web"
previewPath = "/"
title = "Haven Web"
version = "1.0.0"
id = "artifacts/haven-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23445

[services.development]
run = "pnpm --filter @workspace/haven-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/haven-web", "run", "build" ]
publicDir = "artifacts/haven-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23445"
BASE_PATH = "/"
